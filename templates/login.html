<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔩 Borracharia Pro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}.card{background:#fff;border:1px solid #dde3ec;border-radius:16px;padding:36px;width:100%;max-width:400px}.logo{text-align:center;margin-bottom:24px}.logo h1{font-size:24px;font-weight:800;color:#1a2d5a}.logo p{font-size:13px;color:#718096;margin-top:4px}.form-group{margin-bottom:14px}.form-label{font-size:12px;font-weight:600;color:#4a5568;margin-bottom:4px;display:block;text-transform:uppercase}.form-control{width:100%;border:1px solid #dde3ec;border-radius:7px;padding:9px 12px;font-size:14px;font-family:'Inter',sans-serif}.form-control:focus{outline:none;border-color:#1a6fbd}.btn{width:100%;background:#1a2d5a;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}.btn:hover{background:#142447}.alert{background:#fdecea;border-left:3px solid #c0392b;padding:10px 12px;border-radius:6px;font-size:13px;color:#c0392b;margin-bottom:14px}.link{text-align:center;margin-top:16px;font-size:13px;color:#718096}.link a{color:#1a6fbd;text-decoration:none;font-weight:600}footer{margin-top:20px;font-size:11px;color:#aaa;text-align:center}</style>
</head><body>
<div class="card">
  <div class="logo"><h1>🔩 Borracharia Pro</h1><p>Sistema de Gestão Completo</p></div>
  {% if erro %}<div class="alert">{{ erro }}</div>{% endif %}
  <form method="POST">
    <div class="form-group"><label class="form-label">Usuário</label><input class="form-control" name="usuario" required placeholder="seu_usuario"></div>
    <div class="form-group"><label class="form-label">Senha</label><input class="form-control" type="password" name="senha" required placeholder="mínimo 6 caracteres"></div>
    <button class="btn">Entrar →</button>
  </form>
  <div class="link">Não tem conta? <a href="/registrar">Criar conta grátis</a></div>
</div>
<footer>🔩 Borracharia Pro • Criado com ❤️ por Robinho • Orange Tech Solutions</footer>
</body></html>
